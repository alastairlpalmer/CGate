{% comment %}
Loading skeleton shown while an HTMX partial loads (via hx-indicator).
Mimics a filter bar + list card so the swap doesn't jump.
{% endcomment %}
<div class="space-y-4" aria-hidden="true">
    <div class="card px-5 py-4">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="skeleton h-9"></div>
            <div class="skeleton h-9"></div>
        </div>
    </div>
    <div class="card overflow-hidden divide-y divide-light-sage">
        <div class="px-4 py-3 space-y-2">
            <div class="skeleton-text w-1/3"></div>
            <div class="skeleton-text-sm w-2/3"></div>
        </div>
        <div class="px-4 py-3 space-y-2">
            <div class="skeleton-text w-1/4"></div>
            <div class="skeleton-text-sm w-1/2"></div>
        </div>
        <div class="px-4 py-3 space-y-2">
            <div class="skeleton-text w-2/5"></div>
            <div class="skeleton-text-sm w-3/5"></div>
        </div>
        <div class="px-4 py-3 space-y-2">
            <div class="skeleton-text w-1/3"></div>
            <div class="skeleton-text-sm w-1/2"></div>
        </div>
    </div>
</div>
