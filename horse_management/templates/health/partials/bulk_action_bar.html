<!-- Bulk Action Bar + Modal -->
<!-- Requires: wrapping element to have x-data="bulkActions" -->

<!-- Sticky Bottom Action Bar -->
<div x-show="selectedHorses.size > 0"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="translate-y-full opacity-0"
     x-transition:enter-end="translate-y-0 opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="translate-y-0 opacity-100"
     x-transition:leave-end="translate-y-full opacity-0"
     x-cloak
     class="fixed bottom-0 left-0 lg:left-64 right-0 z-40 bg-white border-t border-light-sage shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <span class="text-sm font-medium text-charcoal" x-text="selectedHorses.size + ' horse' + (selectedHorses.size !== 1 ? 's' : '') + ' selected'"></span>
            <button @click="clearAll()" class="text-xs text-sage hover:text-charcoal underline">Clear</button>
        </div>
        <div class="flex items-center gap-3">
            <select x-model="actionType" class="form-select text-sm py-1.5">
                <option value="">Choose action...</option>
                <option value="vaccination">Record Vaccination</option>
                <option value="farrier">Record Farrier Visit</option>
                <option value="worming">Record Worming</option>
                <option value="egg_count">Record Egg Count</option>
                <option value="vet_visit">Record Vet Visit</option>
                <option value="condition">Record Condition</option>
                <option value="expected_departure">Set Expected Departure</option>
                <option value="actual_departure">Set Departure Date</option>
            </select>
            <button @click="openModal()"
                    :disabled="!actionType"
                    :class="actionType ? 'btn-primary' : 'btn-secondary opacity-50 cursor-not-allowed'"
                    class="text-sm">
                Apply to Selected
            </button>
        </div>
    </div>
</div>

<!-- Modal Overlay -->
<div x-show="modalOpen"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     x-cloak
     class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-charcoal/50"
     @click.self="modalOpen = false">

    <div x-show="modalOpen"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         class="bg-white rounded-lg shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto">

        <!-- Modal Header -->
        <div class="flex items-center justify-between px-5 py-4 border-b border-light-sage">
            <h3 class="text-lg font-semibold text-charcoal" x-text="modalTitle"></h3>
            <button @click="modalOpen = false" class="text-sage hover:text-charcoal-light">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- Modal Body (HTMX-loaded form) -->
        <div id="bulk-form-container">
            <div class="p-5 text-center text-sage">
                <p class="text-sm">Loading form...</p>
            </div>
        </div>
    </div>
</div>

<!-- bulkActions() is defined globally in base.html -->
