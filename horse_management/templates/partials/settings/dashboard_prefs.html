<div class="space-y-3" x-data>
    <p class="text-sm text-sage">Show or hide widgets on your home dashboard. Changes save automatically.</p>
    <ul class="divide-y divide-light-sage border border-light-sage rounded-card bg-white">
        {% for item in flat_items %}
        <li class="flex items-center justify-between gap-3 px-4 py-3" data-widget-key="{{ item.key }}">
            <span class="text-sm text-charcoal truncate">{{ item.name }}</span>
            <button type="button" role="switch"
                    x-data="{ on: {{ item.visible|yesno:'true,false' }} }"
                    :aria-checked="on ? 'true' : 'false'"
                    aria-checked="{{ item.visible|yesno:'true,false' }}"
                    @click="on = !on;
                            htmx.ajax('POST', '{% url 'dashboard_toggle' %}', {
                              values: { key: '{{ item.key }}', visible: on ? 'true' : 'false' },
                              swap: 'none',
                              headers: { 'X-CSRFToken': '{{ csrf_token }}' },
                            });"
                    class="form-toggle"
                    aria-label="Toggle {{ item.name }}">
                <span class="form-toggle-thumb"></span>
            </button>
        </li>
        {% endfor %}
    </ul>
</div>
