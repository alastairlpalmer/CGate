{% if high_egg_counts %}
<div class="card">
    <div class="section-header">
        <div class="flex items-center gap-2.5">
            <h2 class="section-title">High Egg Counts</h2>
            <span class="badge-neutral">{{ high_egg_counts|length }}</span>
        </div>
        <span class="text-xs text-sage">&gt;200 EPG</span>
    </div>
    <ul class="divide-y divide-light-sage">
        {% for ec in high_egg_counts %}
        <li class="px-5 py-3">
            <div class="flex items-center justify-between gap-3">
                <div class="min-w-0">
                    <a href="{% url 'horse_detail' ec.horse.pk %}" class="link text-sm tap-pad">{{ ec.horse.name }}</a>
                    <p class="font-mono text-xs text-sage">{{ ec.date|date:"d M Y" }}</p>
                </div>
                <span class="badge-danger shrink-0">{{ ec.count }} EPG</span>
            </div>
        </li>
        {% endfor %}
    </ul>
</div>
{% endif %}
