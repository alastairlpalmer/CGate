{% if field_rest %}
<div class="card">
    <div class="section-header">
        <div class="flex items-center gap-2.5">
            <h2 class="section-title">Field Rest</h2>
            <span class="badge-neutral">{% now "Y" %}</span>
        </div>
        <a href="{% url 'location_list' %}?tab=usage" class="text-xs link">View all &rarr;</a>
    </div>
    <ul class="divide-y divide-light-sage">
        {% for row in field_rest %}
        <li class="px-5 py-3">
            <div class="flex items-center justify-between gap-3">
                <div class="min-w-0">
                    <a href="{% url 'location_detail' row.location.pk %}?tab=usage" class="link text-sm">{{ row.location.name }}</a>
                    <p class="text-xs text-sage truncate">{{ row.location.site }}</p>
                </div>
                <div class="flex items-center gap-4 text-right shrink-0">
                    <div>
                        <p class="font-mono text-sm font-semibold text-sage">{{ row.rested }}</p>
                        <p class="text-[11px] text-sage uppercase tracking-wide">rested</p>
                    </div>
                    <div>
                        <p class="font-mono text-sm font-semibold text-forest">{{ row.horses }}</p>
                        <p class="text-[11px] text-sage uppercase tracking-wide">horses</p>
                    </div>
                </div>
            </div>
        </li>
        {% endfor %}
    </ul>
</div>
{% endif %}
