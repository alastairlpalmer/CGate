{% if upcoming_departures %}
<div class="card lg:col-span-3">
    <div class="section-header">
        <div class="flex items-center gap-2.5">
            <h2 class="section-title">Upcoming Departures</h2>
            <span class="badge-neutral">{{ upcoming_departures|length }}</span>
        </div>
        <span class="badge-info">Next 7 days</span>
    </div>
    <ul class="divide-y divide-light-sage">
        {% for p in upcoming_departures %}
        <li class="px-5 py-3">
            <div class="flex items-center justify-between gap-3">
                <div class="min-w-0">
                    <a href="{% url 'horse_detail' p.horse.pk %}" class="link text-sm">{{ p.horse.name }}</a>
                    <p class="text-xs text-sage truncate">{{ p.owner.name }} &middot; {{ p.location.name }}</p>
                </div>
                <span class="font-mono text-xs text-sage shrink-0">{{ p.expected_departure|date:"d M Y" }}</span>
            </div>
        </li>
        {% endfor %}
    </ul>
</div>
{% endif %}
