{% if vet_follow_ups %}
<div class="card">
    <div class="section-header">
        <div class="flex items-center gap-2.5">
            <h2 class="section-title">Vet Follow-ups</h2>
            <span class="badge-neutral">{{ vet_follow_ups|length }}</span>
        </div>
    </div>
    <ul class="divide-y divide-light-sage">
        {% for v in vet_follow_ups %}
        <li class="px-5 py-3">
            <div class="flex items-center justify-between gap-3">
                <div class="min-w-0">
                    <a href="{% url 'horse_detail' v.horse.pk %}" class="link text-sm tap-pad">{{ v.horse.name }}</a>
                    <p class="text-xs text-sage truncate">{{ v.reason|truncatewords:6 }}</p>
                </div>
                <span class="font-mono text-xs text-sage shrink-0">
                    {{ v.follow_up_date|date:"d M Y" }}
                </span>
            </div>
        </li>
        {% endfor %}
    </ul>
</div>
{% endif %}
