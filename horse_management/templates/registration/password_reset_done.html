{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password reset sent - CGate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        forest: '#1B3A2D',
                        sage: '#6B8F71',
                        charcoal: '#2C2C2C',
                        parchment: '#F7F5F0',
                        'light-sage': '#E8EDE9',
                        'info-blue': '#2E86AB',
                    },
                    fontFamily: {
                        heading: ['"DM Sans"', 'sans-serif'],
                        body: ['"Source Sans 3"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-parchment min-h-screen flex items-center justify-center font-body antialiased text-charcoal">
    <div class="max-w-md w-full mx-4 space-y-6">

        <!-- Logo -->
        <div class="text-center">
            <div class="w-10 h-10 mx-auto flex items-center justify-center mb-3">
                <svg class="w-10 h-10 text-forest" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22 16c0 5.523-3.134 10-7 10s-7-4.477-7-10S11.134 6 15 6s7 4.477 7 10z" stroke="currentColor" stroke-width="2.2" fill="none"/>
                    <line x1="15" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="15" y1="16" x2="21" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="15" y1="20" x2="21" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-charcoal font-heading">CGate</h1>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-xl border border-light-sage shadow-sm p-8 text-center">
            <svg class="w-16 h-16 mx-auto text-info-blue mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
            </svg>

            <h2 class="text-xl font-bold text-charcoal mb-2 font-heading">Check your email</h2>
            <p class="text-sage mb-6">If an account exists with that email address, we've sent a password reset link.</p>

            <a href="{% url 'login' %}" class="text-sm font-medium text-forest hover:text-sage transition-colors">
                &larr; Back to sign in
            </a>
        </div>

    </div>
</body>
</html>
